<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/mynotes.css">
   
</head>

<body>
    
    <div class="container-wrapper">
        <header class="sidebar" >
            <div class="sidebar-box">
                <h1 class="logo">NotePad</h1>
                <button class="burger-button close">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <nav class="navbar">
                <ul class="navbar-menu">
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="mynotes.html">My Notes</a></li>
                </ul>
            </nav>
        </header>
        <main class="main">
            <header class="main-header">
                <div class="main-header-box">
                    <button class="burger-button open">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                    <span class="main-header-text">My notes</span>
                </div>
                <div class="main-header-box">
                    <a href="#" class="main-header-text"><i class="fa-solid fa-bell"></i></a>
                    <a href="#" class="main-header-text"><i class="fa-solid fa-user"></i></a>
                </div>
            </header>
            <!-- =========================== -->
            <div class="container-section">
                <section class="section my-notes">  
                    <div class="notes-section-header">
                        <h2 class="title">Notes</h2>
                        <button class="open-modal-btn" >
                            <span></span>
                            <span></span>
                        </button>
                    </div>
                    <ul class="note-list" id="note-list"></ul>
                </section>
                
                <dialog class="modal-note">
                    <div class="modal-header">
                        <h2 class="title-modal">New Note</h2>
                        <button class="close-modal-btn">X</button>
                    </div>
                    <textarea class="modal-note-text" name="" id="" ></textarea>
                    
                    <button class="modal-add-btn">ADD</button>
                </dialog>

                <!-- <section class="favorites section">
                    <h2 class="title">Favorites</h2>
                    <ul class="favorite-list"></ul>
                </section> -->
            </div>

        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/mynotes.js"></script>

</body>
</html>
